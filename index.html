<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus SnapLock - Vault</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-4 relative overflow-x-hidden">

    <!-- Top Navigation -->
    <nav class="w-full max-w-md bg-slate-800 border border-slate-700 p-1.5 rounded-2xl flex gap-1 mb-4 shadow-xl">
        <a href="index.html" class="flex-1 py-2 text-center text-xs font-black rounded-xl bg-blue-600 text-white transition-all">
            🔥 Vault Feed
        </a>
        <a href="market.html" class="flex-1 py-2 text-center text-xs font-black rounded-xl bg-slate-800 text-slate-400 hover:text-white transition-all">
            🛍️ Campus Market
        </a>
    </nav>

    <!-- Main Feed Container -->
    <div class="w-full max-w-md flex flex-col items-center">
        <header class="w-full text-center my-2">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-wide">Campus SnapLock</h1>
            <p class="text-xs text-slate-400 mt-1">Disappearing campus media vault.</p>
        </header>

        <!-- Post Upload Form -->
        <div class="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl my-4">
            <h2 class="text-xs font-bold mb-2 text-slate-200 flex items-center gap-2">
                <span>📤</span> Post New Campus Snap
            </h2>
            <div class="space-y-2">
                <input type="file" id="imageInput" accept="image/*,video/*" 
                       class="block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white cursor-pointer"/>
                <select id="categoryInput" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-300">
                    <option value="General">📣 #General</option>
                    <option value="Gossip">☕ #CampusGossip</option>
                    <option value="Leaks">📝 #ExamLeaks</option>
                    <option value="Crush">❤️ #CampusCrush</option>
                    <option value="Events">🎉 #Events</option>
                </select>
                <input type="text" id="captionInput" placeholder="Juicy caption..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white">
                <button onclick="uploadPost()" id="uploadBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2.5 rounded-xl cursor-pointer">Upload</button>
            </div>
        </div>

        <!-- Feed List -->
        <main id="feedContainer" class="w-full space-y-4">
            <div class="text-center text-xs text-slate-500 py-6">Loading snaps...</div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
